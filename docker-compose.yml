version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: user_mgmt_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_management
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations/000001_create_users.up.sql:/docker-entrypoint-initdb.d/001_create_users.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: user_mgmt_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: user_management
      SERVER_PORT: "3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
